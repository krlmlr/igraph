name: Stimulus
on:
  push:
    branches:
      - main
      - '*-dev'
      - next
  pull_request:
    branches:
      - main
      - '*-dev'
      - next
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit to check out"
        required: false
        default: ""

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    env:
      STIMULUS_VERSION: "0.21.7"
    steps:
      # Use Clang for more informative error messages
      - name: Install Clang
        run: sudo apt-get install clang

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}
          fetch-depth: 0

      - name: Set pending status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sha=$(git rev-parse HEAD)
          html_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh api --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            repos/${{ github.repository }}/statuses/${sha} \
            -f state=pending -f target_url="${html_url}" \
            -f description="Stimulus validation running" -f context=stimulus
        shell: bash

      - name: Install stimulus
        run: |
          cd interfaces
          python3 -m venv .venv
          .venv/bin/pip install 'git+https://github.com/igraph/stimulus.git@${{ env.STIMULUS_VERSION }}#egg=stimulus'

      - name: Configure igraph
        run: |
          mkdir build && cd build
          cmake ..

      - name: Validate functions.yaml
        run: |
          cd interfaces
          .venv/bin/stimulus -f functions.yaml -t types.yaml -l ci:validate -o test.cpp
          clang++ -std=c++14 -c test.cpp -I ../include -I ../build/include

      - name: Set final status
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            state="success"
          else
            state="failure"
          fi
          sha=$(git rev-parse HEAD)
          html_url=$(gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            repos/${{ github.repository }}/actions/runs/${{ github.run_id }} | jq -r .html_url)
          gh api --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            repos/${{ github.repository }}/statuses/${sha} \
            -f state="${state}" -f target_url="${html_url}" \
            -f description="Stimulus validation ${state}" -f context=stimulus
        shell: bash
